<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<style>

/* ===== BACKGROUND ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;

  background:
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1581092919534-88f3b2b5e6c3');

  background-size: cover;
  background-attachment: fixed;
}

/* ===== TITLE ===== */
h1 {
  color: #38bdf8;
  text-shadow: 0 0 20px #38bdf8;
}

/* ===== DASHBOARD ===== */
.dashboard {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  width: 180px;
  backdrop-filter: blur(10px);
}

.safe { color: #22c55e; }
.warning { color: #facc15; }
.danger { color: #ef4444; }

/* ===== CONTAINER ===== */
.container {
  width: 85%;
  margin: auto;
  padding: 20px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

/* ===== ALERT ===== */
.alert {
  position: fixed;
  top: 20px;
  right: 20px;
  background: red;
  padding: 15px;
  border-radius: 10px;
  display: none;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0.5;}
}

/* ===== BUTTON ===== */
button {
  padding: 12px 20px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border: 1px solid gray;
}

/* ===== METER ===== */
.meter {
  width: 250px;
  height: 20px;
  background: #111;
  margin: auto;
  border-radius: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="alert" id="alertBox">🚨 HIGH COLLAPSE RISK DETECTED!</div>

<h1 data-aos="fade-down">AI Tunnel Monitoring PRO MAX</h1>

<div class="dashboard">

<div class="card safe">SAFE</div>
<div class="card warning">WARNING</div>
<div class="card danger">HIGH RISK</div>

</div>

<div class="container">

<button onclick="startSimulation()">Start Live Simulation</button>

<h3>Risk Meter</h3>
<div class="meter">
  <div id="meterFill" class="fill"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

AOS.init();

let chart;
let dataPoints = [];
let labels = [];

function startSimulation(){

let i = 0;

setInterval(()=>{

let vibration = Math.random()*10;
let pressure = Math.random()*100;
let gas = Math.random()*5;
let water = Math.random()*3;
let displacement = Math.random()*5;

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

labels.push(i);
dataPoints.push(risk);

if(labels.length > 20){
  labels.shift();
  dataPoints.shift();
}

/* ===== GRAPH ===== */
if(!chart){
chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: labels,
datasets: [{
label: "Live Risk",
data: dataPoints,
borderWidth: 3,
tension: 0.4
}]
}
});
}else{
chart.data.labels = labels;
chart.data.datasets[0].data = dataPoints;
chart.update();
}

/* ===== METER ===== */
let meter = document.getElementById("meterFill");
meter.style.width = Math.min(risk,100) + "%";

if(risk < 40){
  meter.style.background = "#22c55e";
}
else if(risk < 70){
  meter.style.background = "#facc15";
}
else{
  meter.style.background = "#ef4444";
}

/* ===== ALERT ===== */
let alertBox = document.getElementById("alertBox");

if(risk > 70){
  alertBox.style.display = "block";
}else{
  alertBox.style.display = "none";
}

i++;

},1000);

}

</script>

</body>
</html>
