<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;

  background: linear-gradient(270deg,#020617,#0f172a,#020617);
  background-size: 600% 600%;
  animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1 {
  color: #38bdf8;
  text-shadow: 0 0 15px #38bdf8;
}

/* Dashboard Panel */
.dashboard {
  width: 80%;
  margin: auto;
  margin-top: 20px;
  padding: 15px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

/* Main container */
.container {
  width: 85%;
  margin: auto;
  margin-top: 20px;
  padding: 20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

/* Button */
button {
  padding: 12px 20px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #38bdf8;
}

/* Table */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.2);
}

th {
  background: rgba(56,189,248,0.2);
}

tr:hover {
  background: rgba(56,189,248,0.1);
}

/* Status */
.safe { color: #22c55e; font-weight: bold; }
.warning { color: orange; font-weight: bold; }
.danger { color: red; font-weight: bold; }
</style>
</head>

<body>

<h1>AI Driven Smart Tunneling and Underground Safety System</h1>

<!-- Dashboard -->
<div class="dashboard">
<h3>📊 Risk Levels</h3>
<p>SAFE: Risk &lt; 40 | WARNING: 40–70 | HIGH RISK: &gt; 70</p>
<p>📍 Sensor Coverage: 0m → 500m Tunnel Length</p>
</div>

<div class="container">

<input type="file" id="fileInput">
<br>
<button onclick="processFile()">Predict Collapse Risk</button>

<table id="resultsTable">
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
</table>

<canvas id="chart" style="margin-top:30px;"></canvas>

</div>

<script>
let chart;

function processFile(){

const file = document.getElementById("fileInput").files[0];
if(!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e){

const rows = e.target.result.split('\n');
const table = document.getElementById("resultsTable");

table.innerHTML = `
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
`;

let distances = [];
let risks = [];

for(let i=1;i<rows.length;i++){

if(!rows[i].trim()) continue;

let d = rows[i].split(',');

let distance = Number(d[0]);
let vibration = Number(d[1]);
let pressure = Number(d[2]);
let gas = Number(d[3]);
let water = Number(d[4]);
let displacement = Number(d[5]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

let status="",cls="";

if(risk<40){status="SAFE";cls="safe";}
else if(risk<70){status="WARNING";cls="warning";}
else{status="HIGH RISK";cls="danger";}

let row = table.insertRow();

row.innerHTML = `
<td>${distance}</td>
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td>${risk.toFixed(2)}</td>
<td class="${cls}">${status}</td>
`;

distances.push(distance);
risks.push(risk);
}

// Graph
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: distances,
datasets: [{
label: "Risk vs Distance",
data: risks,
borderWidth: 2,
fill: false
}]
}
});

};

reader.readAsText(file);
}
</script>

</body>
</html>
