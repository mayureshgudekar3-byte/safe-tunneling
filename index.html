<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;

  background: radial-gradient(circle at top, #0f172a, #020617);
}

/* GRID BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(56,189,248,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ===== TITLE ===== */
h1 {
  font-size: 40px;
  background: linear-gradient(90deg,#38bdf8,#0ea5e9);
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: 0 0 25px rgba(56,189,248,0.5);
  margin-top: 20px;
}

/* ===== CARDS ===== */
.dashboard, .container {
  width: 85%;
  margin: 20px auto;
  padding: 25px;

  background: rgba(255,255,255,0.05);
  border-radius: 20px;

  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);

  box-shadow: 
    0 0 20px rgba(56,189,248,0.2),
    inset 0 0 10px rgba(255,255,255,0.05);

  transition: 0.4s;
}

.dashboard:hover, .container:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 40px rgba(56,189,248,0.5);
}

/* ===== BUTTON ===== */
button {
  padding: 14px 28px;
  border-radius: 12px;
  border: none;

  background: linear-gradient(90deg,#38bdf8,#0ea5e9);
  color: white;
  font-weight: bold;
  letter-spacing: 1px;

  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #38bdf8;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  border-radius: 12px;
  overflow: hidden;
}

th {
  background: linear-gradient(90deg,#0ea5e9,#38bdf8);
  padding: 12px;
}

td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

tr {
  transition: 0.3s;
}

tr:hover {
  background: rgba(56,189,248,0.1);
  transform: scale(1.01);
}

/* ===== BIG RISK TEXT ===== */
#bigRisk {
  font-size: 55px;
  font-weight: bold;
  margin-top: 20px;
  text-shadow: 0 0 30px currentColor;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.1);}
  100% {transform: scale(1);}
}

/* ===== STATUS COLORS ===== */
.safe { color: #22c55e; }
.warning { color: orange; }
.danger { color: red; }

</style>
</head>

<body>

<h1>AI Driven Smart Tunneling and Underground Safety System</h1>

<!-- DASHBOARD -->
<div class="dashboard">
<h3>📊 Risk Levels</h3>
<p>SAFE: Risk &lt; 40 | WARNING: 40–70 | HIGH RISK: &gt; 70</p>
<p>📍 Sensor Coverage: 0m → 500m Tunnel Length</p>
</div>

<!-- MAIN -->
<div class="container">

<input type="file" id="fileInput">
<br><br>

<button onclick="processFile()">Predict Collapse Risk</button>

<!-- BIG RISK -->
<div id="bigRisk"></div>

<!-- TABLE -->
<table id="resultsTable">
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
</table>

<!-- GRAPH -->
<canvas id="chart" style="margin-top:30px;"></canvas>

</div>

<script>

let chart;

function processFile(){

const file = document.getElementById("fileInput").files[0];
if(!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e){

const rows = e.target.result.split('\n');
const table = document.getElementById("resultsTable");

table.innerHTML = `
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
`;

let distances = [];
let risks = [];
let maxRisk = 0;

for(let i=1;i<rows.length;i++){

if(!rows[i].trim()) continue;

let d = rows[i].split(',');

let distance = Number(d[0]);
let vibration = Number(d[1]);
let pressure = Number(d[2]);
let gas = Number(d[3]);
let water = Number(d[4]);
let displacement = Number(d[5]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

if(risk > maxRisk) maxRisk = risk;

let status="",cls="";

if(risk<40){status="SAFE";cls="safe";}
else if(risk<70){status="WARNING";cls="warning";}
else{status="HIGH RISK";cls="danger";}

let row = table.insertRow();

row.innerHTML = `
<td>${distance}</td>
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td>${risk.toFixed(2)}</td>
<td class="${cls}">${status}</td>
`;

distances.push(distance);
risks.push(risk);
}

/* ===== BIG RISK DISPLAY ===== */
let big = document.getElementById("bigRisk");

if(maxRisk < 40){
  big.innerHTML = "SAFE";
  big.style.color = "#22c55e";
}
else if(maxRisk < 70){
  big.innerHTML = "WARNING";
  big.style.color = "orange";
}
else{
  big.innerHTML = "HIGH RISK";
  big.style.color = "red";
}

/* ===== GRAPH ===== */
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: distances,
datasets: [{
label: "Risk vs Distance",
data: risks,
borderWidth: 3,
tension: 0.4
}]
},
options: {
animation: {
duration: 1500
}
}
});

};

reader.readAsText(file);
}

</script>

</body>
</html>
