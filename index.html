<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== VIDEO BACKGROUND ===== */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  top: 0;
  left: 0;
  z-index: -1;
}

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* ===== TITLE ===== */
h1 {
  color: #38bdf8;
  font-size: 32px;
  text-shadow: 0 0 20px #38bdf8;
}

/* ===== DASHBOARD ===== */
.dashboard {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  margin: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  width: 200px;
  box-shadow: 0 0 20px rgba(56,189,248,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* COLORS */
.safe { color: #22c55e; }
.warning { color: #facc15; }
.danger { color: #ef4444; }

/* ===== MAIN CONTAINER ===== */
.container {
  width: 85%;
  margin: auto;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(56,189,248,0.3);
}

/* BUTTON */
button {
  padding: 14px 25px;
  background: linear-gradient(45deg,#38bdf8,#0ea5e9);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
  color: white;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px #38bdf8;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.2);
}

th {
  background: rgba(56,189,248,0.2);
}

/* RISK METER */
.meter {
  width: 200px;
  height: 20px;
  background: #111;
  border-radius: 20px;
  margin: 10px auto;
  overflow: hidden;
}

.meter-fill {
  height: 100%;
  width: 0%;
  transition: 1s;
}

</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video autoplay muted loop id="bgVideo">
  <source src="tunnel.mp4" type="video/mp4">
</video>

<h1>AI Driven Smart Tunneling and Underground Safety System</h1>

<!-- DASHBOARD -->
<div class="dashboard">

<div class="card">
<h3>SAFE</h3>
<p class="safe">Risk &lt; 40</p>
</div>

<div class="card">
<h3>WARNING</h3>
<p class="warning">40 – 70</p>
</div>

<div class="card">
<h3>HIGH RISK</h3>
<p class="danger">&gt; 70</p>
</div>

<div class="card">
<h3>Coverage</h3>
<p>0m → 500m</p>
</div>

</div>

<!-- MAIN -->
<div class="container">

<input type="file" id="fileInput">
<br>
<button onclick="processFile()">Predict Collapse Risk</button>

<h3>Overall Risk Level</h3>
<div class="meter">
  <div class="meter-fill" id="meterFill"></div>
</div>

<table id="resultsTable">
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
</table>

<canvas id="chart"></canvas>

</div>

<script>

let chart;

function processFile(){

const file = document.getElementById("fileInput").files[0];
if(!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e){

const rows = e.target.result.split('\n');
const table = document.getElementById("resultsTable");

table.innerHTML = table.rows[0].outerHTML;

let distances = [];
let risks = [];
let totalRisk = 0;
let count = 0;

for(let i=1;i<rows.length;i++){

if(!rows[i].trim()) continue;

let d = rows[i].split(',');

let distance = Number(d[0]);
let vibration = Number(d[1]);
let pressure = Number(d[2]);
let gas = Number(d[3]);
let water = Number(d[4]);
let displacement = Number(d[5]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

let status="",cls="";

if(risk<40){status="SAFE";cls="safe";}
else if(risk<70){status="WARNING";cls="warning";}
else{status="HIGH RISK";cls="danger";}

let row = table.insertRow();

row.innerHTML = `
<td>${distance}</td>
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td style="font-size:18px;font-weight:bold;">${risk.toFixed(2)}</td>
<td class="${cls}">${status}</td>
`;

distances.push(distance);
risks.push(risk);

totalRisk += risk;
count++;
}

/* ===== RISK METER ===== */
let avgRisk = totalRisk / count;
let meter = document.getElementById("meterFill");

meter.style.width = Math.min(avgRisk,100) + "%";

if(avgRisk < 40){
  meter.style.background = "#22c55e";
}
else if(avgRisk < 70){
  meter.style.background = "#facc15";
}
else{
  meter.style.background = "#ef4444";
}

/* ===== GRAPH ===== */
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: distances,
datasets: [{
label: "Risk vs Distance",
data: risks,
borderWidth: 3,
tension: 0.4
}]
}
});

};

reader.readAsText(file);
}

</script>

</body>
</html>
