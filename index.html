<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<style>

/* ===== SMOOTH SCROLL ===== */
html {
  scroll-behavior: smooth;
}

/* ===== BACKGROUND (YOUR IMAGE) ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;

  background:
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
    url('futuristic-tunnel.jpg');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  animation: fadePage 1.5s ease;
}

/* Page animation */
@keyframes fadePage {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== TITLE ===== */
h1 {
  color: #38bdf8;
  font-size: 36px;
  text-shadow: 0 0 25px #38bdf8;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #38bdf8; }
  to { text-shadow: 0 0 30px #38bdf8; }
}

/* ===== DASHBOARD ===== */
.dashboard {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  margin: 20px;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  width: 220px;
  box-shadow: 0 0 25px rgba(56,189,248,0.4);
  transition: all 0.4s ease;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 40px #38bdf8;
}

/* ===== RISK TEXT ===== */
.safe {
  color: #22c55e;
  font-size: 26px;
  font-weight: bold;
}

.warning {
  color: #facc15;
  font-size: 26px;
  font-weight: bold;
}

.danger {
  color: #ef4444;
  font-size: 26px;
  font-weight: bold;
}

/* ===== MAIN CONTAINER ===== */
.container {
  width: 85%;
  margin: auto;
  padding: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(56,189,248,0.4);
}

/* ===== BUTTON ===== */
button {
  padding: 14px 25px;
  background: linear-gradient(45deg,#38bdf8,#0ea5e9);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
  color: white;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px #38bdf8;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.2);
}

th {
  background: rgba(56,189,248,0.2);
}

/* ===== RISK METER ===== */
.meter {
  width: 250px;
  height: 20px;
  background: #111;
  border-radius: 20px;
  margin: 10px auto;
  overflow: hidden;
}

.meter-fill {
  height: 100%;
  width: 0%;
  transition: 1s ease;
}

</style>
</head>

<body>

<!-- TITLE -->
<h1 data-aos="fade-down">
AI Driven Smart Tunneling and Underground Safety System
</h1>

<!-- DASHBOARD -->
<div class="dashboard">

<div class="card" data-aos="zoom-in">
<h3 class="safe">SAFE</h3>
<p class="safe">Risk &lt; 40</p>
</div>

<div class="card" data-aos="zoom-in">
<h3 class="warning">WARNING</h3>
<p class="warning">40 – 70</p>
</div>

<div class="card" data-aos="zoom-in">
<h3 class="danger">HIGH RISK</h3>
<p class="danger">&gt; 70</p>
</div>

<div class="card" data-aos="zoom-in">
<h3>Coverage</h3>
<p>0m → 500m</p>
</div>

</div>

<!-- MAIN -->
<div class="container" data-aos="fade-up">

<input type="file" id="fileInput">
<br>
<button onclick="processFile()">Predict Collapse Risk</button>

<h3>Overall Risk Level</h3>

<div class="meter">
  <div class="meter-fill" id="meterFill"></div>
</div>

<table id="resultsTable">
<tr>
<th>Distance (m)</th>
<th>Vibration</th>
<th>Pressure</th>
<th>Gas</th>
<th>Water</th>
<th>Displacement</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
</table>

<canvas id="chart"></canvas>

</div>

<script>

/* ===== AOS INIT ===== */
AOS.init({
  duration: 1200,
  once: false,
  mirror: true
});

let chart;

function processFile(){

const file = document.getElementById("fileInput").files[0];
if(!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e){

const rows = e.target.result.split('\n');
const table = document.getElementById("resultsTable");

table.innerHTML = table.rows[0].outerHTML;

let distances = [];
let risks = [];
let totalRisk = 0;
let count = 0;

for(let i=1;i<rows.length;i++){

if(!rows[i].trim()) continue;

let d = rows[i].split(',');

let distance = Number(d[0]);
let vibration = Number(d[1]);
let pressure = Number(d[2]);
let gas = Number(d[3]);
let water = Number(d[4]);
let displacement = Number(d[5]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

let status="",cls="";

if(risk<40){status="SAFE";cls="safe";}
else if(risk<70){status="WARNING";cls="warning";}
else{status="HIGH RISK";cls="danger";}

let row = table.insertRow();

row.innerHTML = `
<td>${distance}</td>
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td style="font-weight:bold;font-size:18px;">${risk.toFixed(2)}</td>
<td class="${cls}">${status}</td>
`;

distances.push(distance);
risks.push(risk);

totalRisk += risk;
count++;
}

/* ===== RISK METER ===== */
let avgRisk = totalRisk / count;
let meter = document.getElementById("meterFill");

meter.style.width = Math.min(avgRisk,100) + "%";

if(avgRisk < 40){
  meter.style.background = "#22c55e";
}
else if(avgRisk < 70){
  meter.style.background = "#facc15";
}
else{
  meter.style.background = "#ef4444";
}

/* ===== GRAPH ===== */
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: distances,
datasets: [{
label: "Risk vs Distance",
data: risks,
borderWidth: 3,
tension: 0.4
}]
}
});

AOS.refresh();

};

reader.readAsText(file);
}

</script>

</body>
</html>
