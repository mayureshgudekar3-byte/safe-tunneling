<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<style>

/* ===== SMOOTH SCROLL ===== */
html {
  scroll-behavior: smooth;
}

/* ===== BACKGROUND (Tunnel Image) ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;

  background:
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
    url('https://images.unsplash.com/photo-1581092919534-88f3b2b5e6c3');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* ===== TITLE ===== */
h1 {
  color: #38bdf8;
  font-size: 32px;
  text-shadow: 0 0 20px #38bdf8;
}

/* ===== DASHBOARD ===== */
.dashboard {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  margin: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  width: 200px;
  box-shadow: 0 0 20px rgba(56,189,248,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.safe { color: #22c55e; }
.warning { color: #facc15; }
.danger { color: #ef4444; }

/* ===== MAIN CONTAINER ===== */
.container {
  width: 85%;
  margin: auto;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(56,189,248,0.3);
}

/* ===== BUTTON ===== */
button {
  padding: 14px 25px;
  background: linear-gradient(45deg,#38bdf8,#0ea5e9);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
  color: white;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px #38bdf8;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.2);
}

th {
  background: rgba(56,189,248,0.2);
}

/* ===== RISK TEXT BIG ===== */
.risk-text {
  font-size: 20px;
  font-weight: bold;
}

/* ===== RISK METER ===== */
.meter {
  width: 250px;
  height: 20px;
  background: #111;
  border-radius: 20px;
  margin: 10px auto;
  overflow: hidden;
}

.meter-fill {
  height: 100%;
  width: 0%;
  transition: 1s;
}

</style>
</head>

<body>

<!-- TITLE -->
<h1 data-aos="fade-down">
AI Driven Smart Tunneling and Underground Safety System
</h1>

<!-- DASHBOARD -->
<div class="dashboard">

<div class="card" data-aos="zoom-in" data-aos-delay="100">
<h3 class="safe">SAFE</h3>
<p class="risk-text safe">Risk &lt; 40</p>
</div>

<div class="card" data-aos="zoom-in" data-aos-delay="200">
<h3 class="warning">WARNING</h3>
<p class="risk-text warning">40 – 70</p>
</div>

<div class="card" data-aos="zoom-in" data-aos-delay="300">
<h3 class="danger">HIGH RISK</h3>
<p class="risk-text danger">&gt; 70</p>
</div>

<div class="card" data-aos="zoom-in" data-aos-delay="400">
<h3>Coverage</h3>
<p>0m → 500m</p>
</div>

</div>

<!-- MAIN -->
<div class="container" data-aos="fade-up" data-aos-delay="200">

<input type="file" id="fileInput">
<br>
<button onclick="processFile()">Predict Collapse Risk</button>

<h3>Overall Risk Level</h3>
<div class="meter">
  <div class="meter-fill" id="meterFill"></div>
</div>

<table id="resultsTable" data-aos="fade-up" data-aos-delay="300">
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
</table>

<canvas id="chart" data-aos="zoom-in" data-aos-delay="400"></canvas>

</div>

<script>

/* ===== INIT ANIMATION ===== */
AOS.init({
  duration: 1200,
  once: true
});

/* ===== MAIN FUNCTION ===== */
let chart;

function processFile(){

const file = document.getElementById("fileInput").files[0];
if(!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e){

const rows = e.target.result.split('\n');
const table = document.getElementById("resultsTable");

table.innerHTML = table.rows[0].outerHTML;

let distances = [];
let risks = [];
let totalRisk = 0;
let count = 0;

for(let i=1;i<rows.length;i++){

if(!rows[i].trim()) continue;

let d = rows[i].split(',');

let distance = Number(d[0]);
let vibration = Number(d[1]);
let pressure = Number(d[2]);
let gas = Number(d[3]);
let water = Number(d[4]);
let displacement = Number(d[5]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

let status="",cls="";

if(risk<40){status="SAFE";cls="safe";}
else if(risk<70){status="WARNING";cls="warning";}
else{status="HIGH RISK";cls="danger";}

let row = table.insertRow();

row.innerHTML = `
<td>${distance}</td>
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td style="font-size:18px;font-weight:bold;">${risk.toFixed(2)}</td>
<td class="${cls}">${status}</td>
`;

distances.push(distance);
risks.push(risk);

totalRisk += risk;
count++;
}

/* ===== RISK METER ===== */
let avgRisk = totalRisk / count;
let meter = document.getElementById("meterFill");

meter.style.width = Math.min(avgRisk,100) + "%";

if(avgRisk < 40){
  meter.style.background = "#22c55e";
}
else if(avgRisk < 70){
  meter.style.background = "#facc15";
}
else{
  meter.style.background = "#ef4444";
}

/* ===== GRAPH ===== */
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: distances,
datasets: [{
label: "Risk vs Distance",
data: risks,
borderWidth: 3,
tension: 0.4
}]
}
});

};

reader.readAsText(file);
}

</script>

</body>
</html>
