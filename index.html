<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Control System</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Particles -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  overflow-x: hidden;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10%;
}

.hero h1 {
  font-size: 70px;
  color: #38bdf8;
  text-shadow: 0 0 20px #38bdf8;
}

.hero p {
  margin-top: 20px;
  color: #94a3b8;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 25px;
  backdrop-filter: blur(20px);
  margin: 40px 10%;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px #38bdf8;
}

/* BUTTON */
button {
  padding: 12px 25px;
  margin-top: 10px;
  background: transparent;
  border: 1px solid #38bdf8;
  color: #38bdf8;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #38bdf8;
  color: black;
  box-shadow: 0 0 15px #38bdf8;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
}

/* COLORS */
.safe { color: #4ade80; text-shadow: 0 0 5px #4ade80; }
.warning { color: #facc15; text-shadow: 0 0 5px #facc15; }
.danger { color: #f87171; text-shadow: 0 0 5px #f87171; }

/* ALERT */
.alert {
  display: none;
  background: red;
  padding: 10px;
  text-align: center;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* SCROLL */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div id="particles"></div>

<!-- HERO -->
<section class="hero">
  <h1>AI Tunnel Control</h1>
  <p>Autonomous underground risk intelligence system</p>
  <p>📍 Monitoring up to 500 meters (50m interval)</p>
</section>

<!-- ALERT -->
<div class="alert" id="alertBox">🚨 HIGH COLLAPSE RISK DETECTED!</div>

<!-- UPLOAD -->
<div class="card fade">
  <h2>Upload Sensor Data</h2>
  <input type="file" id="fileInput"><br>
  <button onclick="processFile()">Run AI Analysis</button>
  <button onclick="generateData()">Generate 500m Simulation</button>
</div>

<!-- DASHBOARD -->
<div class="card fade">
  <h2>Risk Levels</h2>
  <p class="safe">SAFE: Risk < 40</p>
  <p class="warning">WARNING: 40–70</p>
  <p class="danger">HIGH RISK: > 70</p>
</div>

<!-- GRAPH -->
<div class="card fade">
  <h2>AI Risk Graph</h2>
  <canvas id="riskChart"></canvas>
</div>

<!-- TABLE -->
<div class="card fade">
  <h2>Sensor Data Output</h2>
  <table id="resultsTable"></table>
</div>

<script>
let chart;

// CSV PROCESS
function processFile() {
const file = document.getElementById('fileInput').files[0];
if (!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e) {
processRows(e.target.result.split('\n'));
};

reader.readAsText(file);
}

// COMMON FUNCTION
function processRows(rows) {

let table = document.getElementById('resultsTable');

table.innerHTML = `
<tr>
<th>Distance (m)</th>
<th>Vibration</th>
<th>Pressure</th>
<th>Gas</th>
<th>Water</th>
<th>Displacement</th>
<th>Risk</th>
<th>AI Confidence</th>
<th>Status</th>
</tr>`;

let distances = [];
let risks = [];
let highRisk = false;

for (let i = 1; i < rows.length; i++) {
if (!rows[i].trim()) continue;

let d = rows[i].split(',');

let distance = Number(d[0]);
let vibration = Number(d[1]);
let pressure = Number(d[2]);
let gas = Number(d[3]);
let water = Number(d[4]);
let displacement = Number(d[5]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

let confidence = Math.min(100, risk).toFixed(1) + "%";

let status="", cls="";

if (risk < 40) { status="SAFE"; cls="safe"; }
else if (risk < 70) { status="WARNING"; cls="warning"; }
else { status="HIGH RISK"; cls="danger"; highRisk=true; }

distances.push(distance);
risks.push(risk);

let row = table.insertRow();

row.innerHTML = `
<td>${distance}</td>
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td>${risk.toFixed(2)}</td>
<td>${confidence}</td>
<td class="${cls}">${status}</td>`;
}

// ALERT
document.getElementById("alertBox").style.display = highRisk ? "block" : "none";

// GRAPH
if (chart) chart.destroy();

chart = new Chart(document.getElementById('riskChart'), {
type: 'line',
data: {
labels: distances,
datasets: [{
label: 'Risk vs Distance',
data: risks,
borderWidth: 2
}]
}
});
}

// AUTO GENERATE
function generateData() {
let rows = ["distance,vibration,pressure,gas,water,displacement"];

for (let d = 50; d <= 500; d += 50) {
rows.push(`${d},${(d/100+Math.random()).toFixed(2)},${100+d},${(d/200).toFixed(2)},${(d/150).toFixed(2)},${(d/120).toFixed(2)}`);
}

processRows(rows);
}

// SCROLL ANIMATION
const elements = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
elements.forEach(el => {
const top = el.getBoundingClientRect().top;
if (top < window.innerHeight - 100) el.classList.add('show');
});
});

// PARTICLES
tsParticles.load("particles", {
particles: {
number: { value: 60 },
size: { value: 2 },
move: { speed: 1 },
links: { enable: true, color: "#38bdf8" }
}
});
</script>

</body>
</html>
