<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  color: white;
  text-align: center;

  background: url('https://images.unsplash.com/photo-1581090700227-1e37b190418e') no-repeat center center/cover;
}

.overlay {
  background: rgba(0,0,0,0.7);
  min-height: 100vh;
  padding: 30px;
}

h1 {
  color: #38bdf8;
}

.container {
  width: 80%;
  margin: auto;
  background: rgba(30,41,59,0.9);
  padding: 20px;
  border-radius: 10px;
}

/* TABLE */
table {
  margin: auto;
  margin-top: 20px;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  padding: 10px;
  border: 1px solid gray;
}

.safe { color: lightgreen; font-weight: bold; }
.warning { color: orange; font-weight: bold; }
.danger { color: red; font-weight: bold; }

button {
  padding: 10px;
  margin-top: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay">

<h1>AI Driven Smart Tunneling and Underground Safety System</h1>
<p>Upload Sensor Data File (CSV) to Predict Collapse Risk</p>

<div class="container">

<input type="file" id="fileInput"><br>
<button onclick="processFile()">Predict Collapse Risk</button>

<table id="resultsTable">
<tr>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
</table>

<canvas id="riskChart" style="margin-top:30px;"></canvas>

</div>

</div>

<script>
let chart;

function processFile() {

const file = document.getElementById('fileInput').files[0];
if (!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e) {

const rows = e.target.result.split('\n');

const table = document.getElementById('resultsTable');

table.innerHTML = `
<tr>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
`;

let risks = [];
let labels = [];

for (let i = 1; i < rows.length; i++) {

if (!rows[i].trim()) continue;

const d = rows[i].split(',');

let vibration = Number(d[0]);
let pressure = Number(d[1]);
let gas = Number(d[2]);
let water = Number(d[3]);
let displacement = Number(d[4]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

let status="", cls="";

if (risk < 40) { status="SAFE"; cls="safe"; }
else if (risk < 70) { status="WARNING"; cls="warning"; }
else { status="HIGH RISK"; cls="danger"; }

let row = table.insertRow();

row.innerHTML = `
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td>${risk.toFixed(2)}</td>
<td class="${cls}">${status}</td>
`;

risks.push(risk);
labels.push("Data " + i);
}

// GRAPH
if (chart) chart.destroy();

chart = new Chart(document.getElementById('riskChart'), {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'Risk Score',
data: risks,
borderWidth: 2
}]
}
});

};

reader.readAsText(file);
}
</script>

</body>
</html>
