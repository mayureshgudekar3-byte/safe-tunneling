<!DOCTYPE html>
<html>
<head>
<title>AI Tunnel Safety System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BACKGROUND (Tunnel Style) ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;

  background: radial-gradient(circle at center, #0f172a 0%, #020617 80%);
  overflow-x: hidden;
}

/* Moving tunnel glow lines */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    90deg,
    rgba(56,189,248,0.05) 0px,
    rgba(56,189,248,0.05) 2px,
    transparent 2px,
    transparent 80px
  );
  animation: moveTunnel 8s linear infinite;
}

@keyframes moveTunnel {
  0% { transform: translateX(0); }
  100% { transform: translateX(-200px); }
}

/* ===== TITLE ===== */
h1 {
  color: #38bdf8;
  font-size: 32px;
  text-shadow: 0 0 20px #38bdf8;
  animation: fadeIn 2s ease;
}

/* ===== DASHBOARD ===== */
.dashboard {
  width: 80%;
  margin: auto;
  margin-top: 20px;
  padding: 20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(56,189,248,0.3);
}

/* BIG RISK TEXT */
.risk-text {
  font-size: 22px;
  font-weight: bold;
  margin-top: 10px;
}

.safeText {
  color: #22c55e;
  text-shadow: 0 0 10px #22c55e;
}

.warningText {
  color: #facc15;
  text-shadow: 0 0 10px #facc15;
}

.dangerText {
  color: #ef4444;
  text-shadow: 0 0 10px #ef4444;
}

/* ===== MAIN CONTAINER ===== */
.container {
  width: 85%;
  margin: auto;
  margin-top: 20px;
  padding: 20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(56,189,248,0.3);
}

/* ===== BUTTON ===== */
button {
  padding: 14px 25px;
  background: linear-gradient(45deg,#38bdf8,#0ea5e9);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
  color: white;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px #38bdf8;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  animation: fadeIn 1.5s ease;
}

td, th {
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.2);
}

th {
  background: rgba(56,189,248,0.2);
}

tr:hover {
  background: rgba(56,189,248,0.1);
  transform: scale(1.01);
}

/* ===== STATUS COLORS ===== */
.safe { color: #22c55e; font-weight: bold; }
.warning { color: #facc15; font-weight: bold; }
.danger { color: #ef4444; font-weight: bold; }

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

canvas {
  margin-top: 30px;
  animation: fadeIn 2s ease;
}

</style>
</head>

<body>

<h1>AI Driven Smart Tunneling and Underground Safety System</h1>

<!-- DASHBOARD -->
<div class="dashboard">
  <h2>📊 Risk Levels</h2>

  <div class="risk-text safeText">SAFE: Risk &lt; 40</div>
  <div class="risk-text warningText">WARNING: 40 – 70</div>
  <div class="risk-text dangerText">HIGH RISK: &gt; 70</div>

  <p style="margin-top:15px;">📍 Sensor Coverage: 0m → 500m Tunnel Length</p>
</div>

<!-- MAIN -->
<div class="container">

<input type="file" id="fileInput">
<br>
<button onclick="processFile()">Predict Collapse Risk</button>

<table id="resultsTable">
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
</table>

<canvas id="chart"></canvas>

</div>

<script>
let chart;

function processFile(){

const file = document.getElementById("fileInput").files[0];
if(!file) return alert("Upload CSV");

const reader = new FileReader();

reader.onload = function(e){

const rows = e.target.result.split('\n');
const table = document.getElementById("resultsTable");

table.innerHTML = `
<tr>
<th>Distance (m)</th>
<th>Vibration (mm/s)</th>
<th>Pressure (kPa)</th>
<th>Gas (ppm)</th>
<th>Water (m)</th>
<th>Displacement (mm)</th>
<th>Risk Score</th>
<th>Status</th>
</tr>
`;

let distances = [];
let risks = [];

for(let i=1;i<rows.length;i++){

if(!rows[i].trim()) continue;

let d = rows[i].split(',');

let distance = Number(d[0]);
let vibration = Number(d[1]);
let pressure = Number(d[2]);
let gas = Number(d[3]);
let water = Number(d[4]);
let displacement = Number(d[5]);

let risk = (vibration*5)+(pressure/20)+(gas*10)+(water*2)+(displacement*8);

let status="",cls="";

if(risk<40){status="SAFE";cls="safe";}
else if(risk<70){status="WARNING";cls="warning";}
else{status="HIGH RISK";cls="danger";}

let row = table.insertRow();

row.innerHTML = `
<td>${distance}</td>
<td>${vibration}</td>
<td>${pressure}</td>
<td>${gas}</td>
<td>${water}</td>
<td>${displacement}</td>
<td style="font-size:18px;font-weight:bold;">${risk.toFixed(2)}</td>
<td class="${cls}">${status}</td>
`;

distances.push(distance);
risks.push(risk);
}

// GRAPH
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: distances,
datasets: [{
label: "Risk vs Distance",
data: risks,
borderWidth: 3,
tension: 0.4
}]
}
});

};

reader.readAsText(file);
}
</script>

</body>
</html>
